{% macro render_field(field, label_visible=true) %}
    {% if label_visible %}
        {{ field.label(class="form-label") }}
    {% endif %}
    {{ field(**kwargs)|safe }}
    {% if field.errors %}
        {% for error in field.errors %}
            <div class="invalid-feedback d-block">
                {{ error }}
            </div>
        {% endfor %}
    {% endif %}
{% endmacro %}
